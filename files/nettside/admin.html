<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Legg til produkt</title>
    <link rel="stylesheet" href="styke.css">
</head>
<body>
    <header>
        <div class="page-header">
            <div>
                <h1>Adminside</h1>
                <p class="admin-note">Her kan du legge inn nye produkter for musikere, bordkort og blomster. Produktet sendes til backend via <code>/products</code>.</p>
            </div>
            <a class="button" href="Index.html">Tilbake til produktsiden</a>
        </div>
    </header>

    <main class="form-card">
        <div class="form-group">
            <label for="category">Kategori</label>
            <input id="category" class="input-text" type="text" placeholder="Musiker, Bordkort, Blomster" />
        </div>

        <div class="form-group">
            <label for="name">Navn</label>
            <input id="name" class="input-text" type="text" placeholder="Produktnavn" />
        </div>

        <div class="form-group">
            <label for="description">Beskrivelse</label>
            <textarea id="description" class="textarea" placeholder="Beskrivelse av produktet"></textarea>
        </div>

        <div class="form-group">
            <label for="price">Pris (i kroner)</label>
            <input id="price" class="input-text" type="number" placeholder="650" />
        </div>

        <div class="form-group">
            <label for="image">Bildelenke</label>
            <input id="image" class="input-text" type="text" placeholder="https://..." />
        </div>

        <button id="submitButton" class="form-button" type="button">Legg til produkt</button>

        <div id="message" class="message" style="display:none"></div>
    </main>

    <script>
        const submitButton = document.getElementById('submitButton');
        const message = document.getElementById('message');

        function showMessage(text, success = true) {
            message.style.display = 'block';
            message.style.background = success ? '#ecfdf5' : '#fef3c7';
            message.style.borderColor = success ? '#86efac' : '#fde68a';
            message.style.color = success ? '#166534' : '#854d0e';
            message.innerText = text;
        }

        submitButton.addEventListener('click', async () => {
            const product = {
                category: document.getElementById('category').value.trim(),
                name: document.getElementById('name').value.trim(),
                description: document.getElementById('description').value.trim(),
                price: Number(document.getElementById('price').value),
                image: document.getElementById('image').value.trim() || 'https://via.placeholder.com/600x400?text=Produkt'
            };

            if (!product.category || !product.name || !product.description || !product.price) {
                showMessage('Fyll ut alle feltene bortsett fra bilde om du vil bruke standardbilde.', false);
                return;
            }

            try {
                const response = await fetch('/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(product)
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Feil ved lagring');
                }

                showMessage(`Produkt lagt til med ID ${data.id}`);
                document.getElementById('category').value = '';
                document.getElementById('name').value = '';
                document.getElementById('description').value = '';
                document.getElementById('price').value = '';
                document.getElementById('image').value = '';
            } catch (error) {
                console.error(error);
                showMessage(error.message || 'Noe gikk galt', false);
            }
        });
    </script>
</body>
</html>
