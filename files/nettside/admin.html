<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Legg til produkt</title>
    <link rel="stylesheet" href="styke.css">
</head>
<body>
    <header>
        <div class="page-header">
            <div>
                <h1>Adminside</h1>
                <p class="admin-note">Her kan du legge inn nye produkter for musikere, bordkort og blomster.</p>
            </div>
            <a class="button" href="Index.html">Tilbake til produktsiden</a>
        </div>
    </header>

    <main class="form-card">
        <div class="form-group">
            <label for="category">Kategori</label>
            <input id="category" class="input-text" type="text" placeholder="Musiker, Bordkort, Blomster" />
        </div>

        <div class="form-group">
            <label for="name">Navn</label>
            <input id="name" class="input-text" type="text" placeholder="Produktnavn" />
        </div>

        <div class="form-group">
            <label for="description">Beskrivelse</label>
            <textarea id="description" class="textarea" placeholder="Beskrivelse av produktet"></textarea>
        </div>

        <div class="form-group">
            <label for="price">Pris (i kroner)</label>
            <input id="price" class="input-text" type="number" placeholder="650" />
        </div>

        <div class="form-group">
            <label for="image">Bildelenke</label>
            <input id="image" class="input-text" type="text" placeholder="https://..." />
        </div>

        <button id="submitButton" class="form-button" type="button">Legg til produkt</button>

        <div id="message" class="message" style="display:none"></div>
    </main>

    <section class="products" id="products"></section>

    <div id="productModal" class="modal" hidden>
        <div class="modal-content">
            <button id="closeModal" class="modal-close" type="button">×</button>
            <div class="modal-body">
                <h2 id="modalTitle"></h2>
                <p id="modalCategory"></p>
                <p id="modalDescription"></p>
                <p id="modalPrice"></p>
            </div>
        </div>
    </div>

    <script>
        const submitButton = document.getElementById('submitButton');
        const message = document.getElementById('message');

        function showMessage(text, success = true) {
            message.style.display = 'block';
            message.style.background = success ? '#ecfdf5' : '#fef3c7';
            message.style.borderColor = success ? '#86efac' : '#fde68a';
            message.style.color = success ? '#166534' : '#854d0e';
            message.innerText = text;
        }

        submitButton.addEventListener('click', async () => {
            const product = {
                category: document.getElementById('category').value.trim(),
                name: document.getElementById('name').value.trim(),
                description: document.getElementById('description').value.trim(),
                price: Number(document.getElementById('price').value),
                image: document.getElementById('image').value.trim() || 'https://via.placeholder.com/600x400?text=Produkt'
            };

            if (!product.category || !product.name || !product.description || !product.price) {
                showMessage('Fyll ut alle feltene bortsett fra bilde om du vil bruke standardbilde.', false);
                return;
            }

            try {
                const response = await fetch('/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(product)
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Feil ved lagring');
                }

                showMessage(`Produkt lagt til med ID ${data.id}`);
                document.getElementById('category').value = '';
                document.getElementById('name').value = '';
                document.getElementById('description').value = '';
                document.getElementById('price').value = '';
                document.getElementById('image').value = '';
            } catch (error) {
                console.error(error);
                showMessage(error.message || 'Noe gikk galt', false);
            }
        });
    </script>

    <script>
        const fallbackProducts = [
            {
                id: 1,
                category: 'Musiker',
                name: 'Live Musikk - Trio',
                description: 'En energisk musikktrio som spiller pop, jazz og festlåter. Perfekt for bryllup og større selskaper.',
                price: 4500,
                image: 'https://via.placeholder.com/600x400?text=Musiker'
            },
            {
                id: 2,
                category: 'Bordkort',
                name: 'Personlige bordkort',
                description: 'Elegante bordkort med navn og bordnummer. Designet for å gi et personlig preg til selskapet.',
                price: 85,
                image: 'https://via.placeholder.com/600x400?text=Bordkort'
            },
            {
                id: 3,
                category: 'Blomster',
                name: 'Bukett med sesongblomster',
                description: 'Fargerik bukett med sesongens fineste blomster og grønt. Passer til borddekor eller gaver.',
                price: 650,
                image: 'https://via.placeholder.com/600x400?text=Blomster'
            }
        ];

        async function deleteProduct(productId, card) {
            try {
                const response = await fetch(`/products/${productId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Feil ved sletting av produkt');
                }

                card.remove();
                showMessage('Produkt slettet', true);
            } catch (error) {
                console.error(error);
                showMessage(error.message || 'Noe gikk galt ved sletting', false);
            }
        }

        function createProductCard(product) {
            const card = document.createElement('article');
            card.className = 'product-card';

            const removeButton = document.createElement('button');
            removeButton.className = 'product-remove-button';
            removeButton.type = 'button';
            removeButton.textContent = '×';
            removeButton.title = 'Slett produkt';
            removeButton.addEventListener('click', () => deleteProduct(product.id, card));
            card.appendChild(removeButton);

            const img = document.createElement('img');
            img.className = 'product-image';
            img.src = product.image;
            img.alt = product.name;
            card.appendChild(img);

            const content = document.createElement('div');
            content.className = 'product-content';

            const category = document.createElement('div');
            category.className = 'product-category';
            category.textContent = product.category;

            const title = document.createElement('h2');
            title.className = 'product-title';
            title.textContent = product.name;

            const description = document.createElement('p');
            description.className = 'product-description';
            description.textContent = product.description;

            const footer = document.createElement('div');
            footer.className = 'product-footer';

            const price = document.createElement('div');
            price.className = 'product-price';
            price.textContent = `${product.price} kr`;

            const actions = document.createElement('div');
            actions.className = 'product-actions';

            const button = document.createElement('button');
            button.className = 'button';
            button.type = 'button';
            button.textContent = 'Vis mer';
            button.addEventListener('click', () => openProductModal(product));

            actions.appendChild(button);
            footer.appendChild(price);
            footer.appendChild(actions);
            content.appendChild(category);
            content.appendChild(title);
            content.appendChild(description);
            content.appendChild(footer);
            card.appendChild(content);

            return card;
        }

        async function loadProducts() {
            const container = document.getElementById('products');
            container.textContent = '';
            const loadingMessage = document.createElement('p');
            loadingMessage.textContent = 'Laster produkter...';
            container.appendChild(loadingMessage);

            try {
                const response = await fetch('/products');
                if (!response.ok) {
                    throw new Error('Feil ved henting av produkter');
                }
                const products = await response.json();
                container.textContent = '';
                if (products.length === 0) {
                    const noProducts = document.createElement('p');
                    noProducts.textContent = 'Ingen produkter funnet.';
                    container.appendChild(noProducts);
                    return;
                }
                products.forEach(product => container.appendChild(createProductCard(product)));
            } catch (error) {
                console.error(error);
                container.textContent = '';
                fallbackProducts.forEach(product => container.appendChild(createProductCard(product)));
            }
        }

        function openProductModal(product) {
            const modal = document.getElementById('productModal');
            document.getElementById('modalTitle').textContent = product.name || '';
            document.getElementById('modalCategory').textContent = product.category ? `Kategori: ${product.category}` : '';
            document.getElementById('modalDescription').textContent = product.description || '';
            document.getElementById('modalPrice').textContent = product.price ? `Pris: ${product.price} kr` : '';
            modal.hidden = false;
        }

        function closeProductModal() {
            document.getElementById('productModal').hidden = true;
        }

        document.getElementById('closeModal').addEventListener('click', closeProductModal);
        document.getElementById('productModal').addEventListener('click', (event) => {
            if (event.target === event.currentTarget) {
                closeProductModal();
            }
        });

        loadProducts();
    </script>
</body>
</html>
